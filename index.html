<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger AR</title>
<script type="module" src="https://unpkg.com/@google/model-viewer@v3.5.0/dist/model-viewer.min.js"></script>
<style>
  body { margin:0; font-family: sans-serif; background:#111; color:#eee; text-align:center; }
  h1 { padding: 16px; font-size: 18px; }
  model-viewer { width: 100%; height: 80vh; background:#222; }
  p { padding: 10px; font-size: 13px; color:#aaa; }
</style>
</head>
<body>
  <h1>Burger — 3D / AR</h1>
  <model-viewer
    src="burger.glb"
    alt="3D scanned burger"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1">
  </model-viewer>
  <p>Drag to rotate. On a phone, tap the AR icon to view it on your table.</p>
</body>
</html>
